<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>Anniversary AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./video3.mp4" webkit-playsinline playsinline loop muted crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#vid" position="0 0 0" width="1" height="1.778" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#target');
      const vid = document.querySelector('#vid');

      // เมื่อสแกนเจอรูปภาพเป้าหมาย
      target.addEventListener("targetFound", event => {
        vid.play();
      });

      // เมื่อรูปภาพเป้าหมายหลุดออกจากกล้อง
      target.addEventListener("targetLost", event => {
        vid.pause();
      });

      // เพิ่มโค้ดกันเหนียว: ถ้าเบราว์เซอร์มือถือบล็อกวิดีโอ ให้แตะหน้าจอ 1 ครั้งเพื่อบังคับเล่น
      window.addEventListener('click', () => {
        vid.play();
      });
    </script>
  </body>
</html>
