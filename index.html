<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>Anniversary AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #playButton {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff4b4b;
        color: white;
        font-size: 18px;
        font-family: sans-serif;
        font-weight: bold;
        border: none;
        border-radius: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        z-index: 9999;
        display: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="playButton">กดเพื่อดูวิดีโอ ❤️</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./video3.mp4" webkit-playsinline playsinline loop muted crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-entity geometry="primitive: plane; width: 1; height: 1.778" material="shader: flat; src: #vid" position="0 0 0" rotation="0 0 0"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#target');
      const vid = document.querySelector('#vid');
      const playBtn = document.querySelector('#playButton');

      target.addEventListener("targetFound", event => {
        playBtn.style.display = 'block';
      });

      target.addEventListener("targetLost", event => {
        playBtn.style.display = 'none';
        vid.pause();
      });

      const tryToPlay = () => {
        vid.play().then(() => {
          playBtn.style.display = 'none';
        }).catch((error) => {
          alert("Safari Error: " + error.message);
        });
      };

      playBtn.addEventListener('click', tryToPlay);
      playBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        tryToPlay();
      });
    </script>
  </body>
</html>
