<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8">
    <title>Anniversary AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      #playButton {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background-color: #ff4b4b;
        color: white;
        font-size: 18px;
        font-family: sans-serif;
        font-weight: bold;
        border: none;
        border-radius: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        z-index: 9999;
        display: none; /* ซ่อนไว้ก่อนจนกว่าจะสแกนเจอรูป */
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    
    <button id="playButton">กดเพื่อดูวิดีโอ ❤️</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="video3.mp4" autoplay preload="auto" webkit-playsinline playsinline loop muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target">
        <a-video src="#vid" position="0 0 0" width="1" height="1.778" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const target = document.querySelector('#target');
      const vid = document.querySelector('#vid');
      const playBtn = document.querySelector('#playButton');

      // เมื่อสแกนเจอรูปภาพเป้าหมาย ให้แสดงปุ่มขึ้นมา
      target.addEventListener("targetFound", event => {
        playBtn.style.display = 'block';
      });

      // เมื่อรูปภาพเป้าหมายหลุดออกจากกล้อง ให้ซ่อนปุ่มและหยุดวิดีโอ
      target.addEventListener("targetLost", event => {
        playBtn.style.display = 'none';
        vid.pause();
      });

      // เมื่อกดปุ่ม ให้เล่นวิดีโอและซ่อนปุ่มทิ้ง
      playBtn.addEventListener('click', () => {
        vid.play();
        playBtn.style.display = 'none';
      });
      
      // เผื่อไว้สำหรับมือถือที่รับค่าแบบสัมผัส (Touch)
      playBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); // ป้องกันการกดซ้ำซ้อน
        vid.play();
        playBtn.style.display = 'none';
      });
    </script>
  </body>
</html>
